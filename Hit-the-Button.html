<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Maths Platform - Hidden Group Code</title>
<style>
body{font-family:Arial;text-align:center;background:linear-gradient(135deg,#4facfe,#00f2fe);margin:0;color:white;}
.login-box{display:inline-block;background:rgba(255,255,255,0.9);color:black;padding:20px;margin:15px;border-radius:12px;vertical-align:top;}
input, button{padding:6px;margin:5px;}
button{border:none;border-radius:6px;cursor:pointer;}
h2{margin-top:0;}
ul{list-style:none;padding:0;}
#yearSelection{display:none;}
.year-btn{display:inline-block;margin:5px;padding:10px 15px;background:#ffcc00;color:black;border-radius:6px;cursor:pointer;}
</style>
</head>
<body>

<h1>🏫 School Maths Platform</h1>
<p>Log in with your role</p>

<!-- LOGIN BOXES -->
<div class="login-box" id="headLogin">
  <h2>Headteacher</h2>
  <input id="headSchool" placeholder="School Name"><br>
  <input id="headUser" placeholder="Username"><br>
  <input id="headPass" type="password" placeholder="Password"><br>
  <button onclick="loginHead()">Login</button>
  <p id="headMsg"></p>
</div>

<div class="login-box" id="teacherLogin">
  <h2>Teacher</h2>
  <input id="teacherSchool" placeholder="School Name"><br>
  <input id="teacherClass" placeholder="Class Code"><br>
  <input id="teacherUser" placeholder="Username"><br>
  <input id="teacherPass" type="password" placeholder="Password"><br>
  <button onclick="loginTeacher()">Login</button>
  <p id="teacherMsg"></p>
</div>

<div class="login-box" id="studentLogin">
  <h2>Student</h2>
  <input id="studentClass" placeholder="Class Code"><br>
  <button onclick="loginStudent()">Login</button>
  <p id="studentMsg"></p>
</div>

<div class="login-box" id="groupAdminLogin">
  <h2>Group Admin / Friends</h2>
  <input id="groupUser" placeholder="Username"><br>
  <input id="groupCode" type="password" placeholder="Enter Group Code"><br>
  <button onclick="loginGroup()">Login</button>
  <p id="groupMsg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="login-box" style="display:none;">
  <h2 id="dashboardTitle"></h2>
  <p id="dashboardContent"></p>
  <button onclick="play()">Play</button>
  <br><br>
  <button onclick="logout()">Logout</button>
</div>

<!-- YEAR SELECTION -->
<div id="yearSelection" class="login-box">
  <h2>Select Your Year Group</h2>
  <div id="yearButtons"></div>
  <br>
  <button onclick="backToDashboard()">Back</button>
</div>

<script>
// ===== GLOBALS =====
const groupCode = "A6MIN"; // Hidden: users must know this
let friendList = JSON.parse(localStorage.getItem("groupFriends") || '["admin"]');
let currentRole = null;

// ===== LOGIN FUNCTIONS =====
function loginHead(){
  let school = document.getElementById("headSchool").value.trim();
  let user = document.getElementById("headUser").value.trim();
  let pass = document.getElementById("headPass").value;
  if(!school || !user || !pass){ document.getElementById("headMsg").innerText="Enter all fields"; return; }
  currentRole = "Headteacher";
  showDashboard("Headteacher Dashboard", "Welcome, "+user+" from "+school+"!");
}

function loginTeacher(){
  let school = document.getElementById("teacherSchool").value.trim();
  let cls = document.getElementById("teacherClass").value.trim();
  let user = document.getElementById("teacherUser").value.trim();
  let pass = document.getElementById("teacherPass").value;
  if(!school || !cls || !user || !pass){ document.getElementById("teacherMsg").innerText="Enter all fields"; return; }
  currentRole = "Teacher";
  showDashboard("Teacher Dashboard", "Welcome, "+user+" teaching class "+cls+" at "+school+"!");
}

function loginStudent(){
  let cls = document.getElementById("studentClass").value.trim();
  if(!cls){ document.getElementById("studentMsg").innerText="Enter class code"; return; }
  currentRole = "Student";
  showDashboard("Student Dashboard", "Welcome to class "+cls+"!");
}

function loginGroup(){
  let user = document.getElementById("groupUser").value.trim();
  let code = document.getElementById("groupCode").value.trim().toUpperCase();
  if(code !== groupCode){ document.getElementById("groupMsg").innerText="Invalid group code"; return; }
  if(user && !friendList.includes(user)) friendList.push(user);
  localStorage.setItem("groupFriends", JSON.stringify(friendList));
  currentRole = "GroupAdmin";
  showDashboard("Group Admin Dashboard", "Welcome, "+user+"! Friends: "+friendList.join(", "));
}

// ===== DASHBOARD =====
function showDashboard(title, content){
  document.getElementById("headLogin").style.display="none";
  document.getElementById("teacherLogin").style.display="none";
  document.getElementById("studentLogin").style.display="none";
  document.getElementById("groupAdminLogin").style.display="none";
  document.getElementById("dashboard").style.display="block";
  document.getElementById("dashboardTitle").innerText = title;
  document.getElementById("dashboardContent").innerText = content;
}

// ===== PLAY BUTTON =====
function play(){
  document.getElementById("dashboard").style.display="none";
  document.getElementById("yearSelection").style.display="block";
  const years = ["Year 1","Year 2","Year 3","Year 4","Year 5","Year 6"];
  const container = document.getElementById("yearButtons");
  container.innerHTML="";
  years.forEach(y=>{
    const btn = document.createElement("div");
    btn.className="year-btn";
    btn.innerText=y;
    btn.onclick=()=>alert("Selected "+y+" — here start the maths game!");
    container.appendChild(btn);
  });
}

// ===== BACK BUTTON =====
function backToDashboard(){
  document.getElementById("yearSelection").style.display="none";
  document.getElementById("dashboard").style.display="block";
}

// ===== LOGOUT =====
function logout(){
  currentRole=null;
  document.getElementById("headLogin").style.display="inline-block";
  document.getElementById("teacherLogin").style.display="inline-block";
  document.getElementById("studentLogin").style.display="inline-block";
  document.getElementById("groupAdminLogin").style.display="inline-block";
  document.getElementById("dashboard").style.display="none";
  document.getElementById("yearSelection").style.display="none";
  document.getElementById("headMsg").innerText="";
  document.getElementById("teacherMsg").innerText="";
  document.getElementById("studentMsg").innerText="";
  document.getElementById("groupMsg").innerText="";
}
</script>

</body>
</html>

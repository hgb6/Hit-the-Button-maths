<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Maths Platform - Questions</title>
<style>
body{font-family:Arial;text-align:center;background:linear-gradient(135deg,#4facfe,#00f2fe);margin:0;color:white;}
.login-box{display:inline-block;background:rgba(255,255,255,0.9);color:black;padding:20px;margin:15px;border-radius:12px;vertical-align:top;}
input, button{padding:6px;margin:5px;}
button{border:none;border-radius:6px;cursor:pointer;}
h2{margin-top:0;}
ul{list-style:none;padding:0;}
#yearSelection, #questionArea{display:none;}
.answer-btn{display:block;margin:10px auto;padding:10px 20px;background:#ffcc00;color:black;border-radius:6px;cursor:pointer;width:200px;}
</style>
</head>
<body>

<h1>🏫 School Maths Platform</h1>

<!-- YEAR SELECTION -->
<div id="yearSelection" class="login-box">
  <h2>Select Your Year Group</h2>
  <div id="yearButtons"></div>
</div>

<!-- QUESTION AREA -->
<div id="questionArea" class="login-box">
  <h2 id="questionTitle"></h2>
  <div id="answerButtons"></div>
  <p id="questionProgress"></p>
  <button onclick="restart()">Restart</button>
  <button onclick="continueQuestions()">Continue</button>
</div>

<script>
// ===== GLOBALS =====
let yearGroup = "";
let questions = [];
let currentQuestionIndex = 0;
let questionBatch = 1; // batch of 10 questions
let completedQuestions = 0;

// ===== YEAR SELECTION =====
const years = ["Year 1","Year 2","Year 3","Year 4","Year 5","Year 6"];
const yearContainer = document.getElementById("yearButtons");
years.forEach(y=>{
  const btn = document.createElement("button");
  btn.innerText = y;
  btn.onclick = ()=>startYear(y);
  yearContainer.appendChild(btn);
});

// ===== START YEAR =====
function startYear(year){
  yearGroup = year;
  document.getElementById("yearSelection").style.display="none";
  document.getElementById("questionArea").style.display="block";
  completedQuestions = 0;
  questionBatch = 1;
  loadQuestions();
  showQuestion();
}

// ===== LOAD QUESTIONS =====
function loadQuestions(){
  // Example: For demo purposes we create simple questions per year
  const yearNum = parseInt(yearGroup.split(" ")[1]);
  questions = [];
  for(let i=0;i<10;i++){
    let a = Math.floor(Math.random()*10*yearNum);
    let b = Math.floor(Math.random()*10*yearNum);
    questions.push({
      q: `${a} + ${b} = ?`,
      correct: a+b,
      answers: shuffle([a+b, a+b+1, a+b-1, a+b+2])
    });
  }
}

// ===== SHOW QUESTION =====
function showQuestion(){
  if(currentQuestionIndex >= questions.length){
    document.getElementById("questionTitle").innerText="Batch Complete!";
    document.getElementById("answerButtons").innerHTML="";
    return;
  }
  const q = questions[currentQuestionIndex];
  document.getElementById("questionTitle").innerText=q.q;
  const container = document.getElementById("answerButtons");
  container.innerHTML="";
  q.answers.forEach(a=>{
    const btn = document.createElement("button");
    btn.className="answer-btn";
    btn.innerText=a;
    btn.onclick = ()=>answerQuestion(a);
    container.appendChild(btn);
  });
  document.getElementById("questionProgress").innerText=`Question ${currentQuestionIndex+1} of ${questions.length} (Batch ${questionBatch})`;
}

// ===== ANSWER QUESTION =====
function answerQuestion(ans){
  const q = questions[currentQuestionIndex];
  if(ans === q.correct){
    completedQuestions++;
  }
  currentQuestionIndex++;
  showQuestion();
}

// ===== CONTINUE & RESTART =====
function continueQuestions(){
  if(currentQuestionIndex >= questions.length){
    questionBatch++;
    currentQuestionIndex=0;
    loadQuestions();
    showQuestion();
  }
}

function restart(){
  currentQuestionIndex=0;
  questionBatch=1;
  completedQuestions=0;
  loadQuestions();
  showQuestion();
}

// ===== HELPER =====
function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}

// ===== INITIAL DISPLAY =====
document.getElementById("yearSelection").style.display="block";
</script>

</body>
</html>
